# =============================================================================
# CI/CD PIPELINE — PULL REQUEST TO MASTER
# =============================================================================
#
# WHAT DOES THIS PIPELINE DO?
#   Runs all tests whenever someone opens (or updates) a Pull Request
#   that targets the `master` branch.
#
# WHY?
#   This acts as a GATE. Combined with branch protection rules, it prevents
#   anyone from merging broken code into master. The test results show as
#   a green checkmark ✅ or red X ❌ directly on the PR page.
#
# WORKFLOW:
#   Developer pushes to `test` branch
#     → test-branch.yml runs tests + deploys to test server
#     → Developer manually tests the app on the test server
#     → Developer creates a PR from `test` → `master`
#     → THIS workflow runs tests again as a final check
#     → If tests pass + PR is approved → merge is allowed
#
# NOTE: This pipeline does NOT deploy anything. It only validates.
#       Deployment from master would be a separate workflow if needed.
# =============================================================================

name: PR to Master

# =============================================================================
# TRIGGER: Pull Request events targeting master
# =============================================================================
# "pull_request" triggers when:
#   - A new PR is opened targeting master
#   - New commits are pushed to an existing PR targeting master
#   - A PR is reopened
#
# This does NOT trigger on direct pushes to master (which should be blocked
# by branch protection rules anyway).
on:
  pull_request:
    branches:
      - master  # Only PRs that want to merge INTO master

# =============================================================================
# JOBS
# =============================================================================
jobs:
  test:
    name: Run Tests  # Label shown in GitHub Actions UI and on the PR checks
    runs-on: ubuntu-latest  # Use a fresh Ubuntu VM as the runner

    steps:
      # Clone the PR's code onto the runner.
      # GitHub automatically creates a temporary merge of the PR branch with master,
      # so tests run against the MERGED result — not just the PR branch alone.
      # This catches conflicts or issues that only appear after merging.
      - name: Checkout code
        uses: actions/checkout@v4  # Official GitHub action to clone the repo

      # Install Node.js on the runner
      # node-version: '20' — matches what's on our server for consistency
      # cache: 'npm' — caches the npm package cache between runs for speed
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Use Node.js version 20 (LTS)
          cache: 'npm'        # Cache ~/.npm directory to speed up installs

      # Install ALL dependencies (including devDependencies like jest & supertest)
      # npm ci = "clean install" — uses exact versions from package-lock.json
      # This ensures the test environment matches exactly what other developers have
      - name: Install dependencies
        run: npm ci  # Faster and more reliable than "npm install" in CI

      # Run the full test suite.
      # If ANY test fails:
      #   - This step exits with a non-zero code
      #   - The job is marked as failed
      #   - GitHub shows a red X ❌ on the PR page
      #   - With branch protection enabled, the "Merge" button stays DISABLED
      #   - No one can merge broken code into master
      # If ALL tests pass:
      #   - GitHub shows a green checkmark ✅ on the PR page
      #   - The "Merge" button becomes clickable
      - name: Run tests
        run: npm test
