<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Items Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { text-align: center; margin-bottom: 30px; color: #333; }

    /* Login */
    #login-section, #app-section { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    #login-section h2, #app-section h2 { margin-bottom: 15px; color: #555; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 4px; font-weight: bold; color: #555; }
    .form-group input { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    button { padding: 8px 20px; background: #4CAF50; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { background: #45a049; }
    button.delete-btn { background: #e74c3c; }
    button.delete-btn:hover { background: #c0392b; }
    button.edit-btn { background: #3498db; }
    button.edit-btn:hover { background: #2980b9; }

    /* Items */
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #f9f9f9; }
    .actions button { margin-right: 5px; }
    #message { padding: 10px; margin-bottom: 15px; border-radius: 4px; display: none; }
    #message.success { display: block; background: #d4edda; color: #155724; }
    #message.error { display: block; background: #f8d7da; color: #721c24; }
    #app-section { display: none; }
    #add-form { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    #add-form input { flex: 1; min-width: 150px; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Items Manager</h1>

  <!-- Login Section -->
  <div id="login-section">
    <h2>Login</h2>
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>
    <button id="login-btn">Login</button>
  </div>

  <!-- App Section -->
  <div id="app-section">
    <h2>Manage Items</h2>
    <div id="message"></div>

    <div id="add-form">
      <input type="text" id="item-name" placeholder="Item name">
      <input type="text" id="item-desc" placeholder="Description">
      <button id="add-btn">Add Item</button>
    </div>

    <table>
      <thead>
        <tr><th>ID</th><th>Name</th><th>Description</th><th>Actions</th></tr>
      </thead>
      <tbody id="items-tbody"></tbody>
    </table>
    <br>
    <button id="logout-btn" class="delete-btn">Logout</button>
  </div>

  <script>
    let authHeader = '';

    const loginSection = document.getElementById('login-section');
    const appSection = document.getElementById('app-section');
    const msgEl = document.getElementById('message');

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = type;
      setTimeout(() => { msgEl.className = ''; msgEl.style.display = 'none'; }, 3000);
    }

    function authHeaders() {
      return { 'Authorization': authHeader, 'Content-Type': 'application/json' };
    }

    // Login
    document.getElementById('login-btn').addEventListener('click', async () => {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      if (!user || !pass) return showMsg('Please enter credentials', 'error');

      authHeader = 'Basic ' + btoa(user + ':' + pass);

      try {
        const res = await fetch('/api/items', { headers: authHeaders() });
        if (!res.ok) throw new Error('Invalid credentials');
        loginSection.style.display = 'none';
        appSection.style.display = 'block';
        loadItems();
      } catch (e) {
        authHeader = '';
        showMsg(e.message, 'error');
      }
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
      authHeader = '';
      loginSection.style.display = 'block';
      appSection.style.display = 'none';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    });

    // Load items
    async function loadItems() {
      try {
        const res = await fetch('/api/items', { headers: authHeaders() });
        const items = await res.json();
        const tbody = document.getElementById('items-tbody');
        tbody.innerHTML = '';
        items.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${escapeHtml(item.name)}</td>
            <td>${escapeHtml(item.description)}</td>
            <td class="actions">
              <button class="edit-btn" onclick="editItem(${item.id})">Edit</button>
              <button class="delete-btn" onclick="deleteItem(${item.id})">Delete</button>
            </td>`;
          tbody.appendChild(tr);
        });
      } catch (e) {
        showMsg('Failed to load items', 'error');
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Add item
    document.getElementById('add-btn').addEventListener('click', async () => {
      const name = document.getElementById('item-name').value.trim();
      const description = document.getElementById('item-desc').value.trim();
      if (!name) return showMsg('Name is required', 'error');

      try {
        const res = await fetch('/api/items', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ name, description })
        });
        if (!res.ok) throw new Error('Failed to add item');
        document.getElementById('item-name').value = '';
        document.getElementById('item-desc').value = '';
        showMsg('Item added', 'success');
        loadItems();
      } catch (e) { showMsg(e.message, 'error'); }
    });

    // Edit item
    window.editItem = async (id) => {
      const name = prompt('New name:');
      if (name === null) return;
      const description = prompt('New description:');

      try {
        const res = await fetch(`/api/items/${id}`, {
          method: 'PUT', headers: authHeaders(),
          body: JSON.stringify({ name, description })
        });
        if (!res.ok) throw new Error('Failed to update item');
        showMsg('Item updated', 'success');
        loadItems();
      } catch (e) { showMsg(e.message, 'error'); }
    };

    // Delete item
    window.deleteItem = async (id) => {
      if (!confirm('Delete this item?')) return;
      try {
        const res = await fetch(`/api/items/${id}`, {
          method: 'DELETE', headers: authHeaders()
        });
        if (!res.ok) throw new Error('Failed to delete item');
        showMsg('Item deleted', 'success');
        loadItems();
      } catch (e) { showMsg(e.message, 'error'); }
    };
  </script>
  <p id="version-info" style="text-align:center; color:#aaa; font-size:12px; margin-top:30px;">Loading version...</p>
  <script>
    // Fetch the version info from version.json and display it at the bottom
    // The "?t=" cache buster ensures the browser always gets the latest version
    fetch('/version.json?t=' + Date.now())
      .then(r => r.json())
      .then(v => {
        document.getElementById('version-info').textContent =
          'v' + v.version + ' — ' + v.date + ' ' + v.time + ' UTC';
      })
      .catch(() => {
        document.getElementById('version-info').textContent = 'Version info unavailable';
      });
  </script>
</body>
</html>
